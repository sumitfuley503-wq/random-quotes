<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarcasm Central</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-card">
        <div class="top-bar">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <p class="window-title">System_Overload.exe</p>
        </div>

        <div class="content-area">
            <h1 class="header-text">Random quote generator <span>1.0</span></h1>
            
            <div class="display-box">
                <p id="quote">ज्ञान लेने आए हो? बटन तो दबाओ पहले...</p>
                <p id="author">- Management</p>
            </div>

            <button id="new-quote">सच सुनना है?</button>
        </div>
        
        <p class="footer-note">Warning: Use brain before reading.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
